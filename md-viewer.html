<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document viewer</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<style>
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --ink: #1a1a1a;
    --ink-2: #374151;
    --muted: #6b7280;
    --line: #e5e7eb;
    --accent: #1e40af;
    --accent-bg: #eff6ff;
    --accent-2: #2563eb;
    --code-bg: #f3f4f6;
  }
  * { box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.65;
    margin: 0;
    padding: 0;
  }

  /* ── Top bar ── */
  .topbar {
    background: var(--accent);
    color: white;
    padding: 12px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .topbar a {
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.15s;
  }
  .topbar a:hover { color: white; }
  .topbar .sep { color: rgba(255,255,255,0.35); font-size: 13px; }
  .topbar .doc-title {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Content ── */
  .content {
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  /* ── Markdown styles ── */
  .content h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin: 0 0 8px 0;
    color: var(--ink);
    line-height: 1.2;
  }
  .content h2 {
    font-size: 20px;
    font-weight: 700;
    margin: 40px 0 12px 0;
    color: var(--ink);
    padding-bottom: 8px;
    border-bottom: 2px solid var(--line);
  }
  .content h3 {
    font-size: 16px;
    font-weight: 700;
    margin: 28px 0 10px 0;
    color: var(--ink);
  }
  .content h4 {
    font-size: 14px;
    font-weight: 700;
    margin: 20px 0 8px 0;
    color: var(--ink-2);
  }
  .content p { margin: 0 0 14px 0; color: var(--ink-2); }
  .content ul, .content ol {
    margin: 0 0 14px 0;
    padding-left: 22px;
    color: var(--ink-2);
  }
  .content li { margin: 5px 0; line-height: 1.55; }
  .content strong { color: var(--ink); font-weight: 700; }
  .content em { font-style: italic; }
  .content a { color: var(--accent-2); }
  .content hr {
    border: none;
    border-top: 1px solid var(--line);
    margin: 32px 0;
  }
  .content blockquote {
    border-left: 3px solid var(--accent);
    margin: 16px 0;
    padding: 10px 16px;
    background: var(--accent-bg);
    border-radius: 0 6px 6px 0;
    color: var(--ink-2);
    font-style: italic;
  }
  .content blockquote p { margin: 0; }

  /* ── Code ── */
  .content code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    font-size: 0.88em;
    color: #be185d;
  }
  .content pre {
    background: #1e293b;
    color: #e2e8f0;
    padding: 20px 24px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 16px 0;
    font-size: 13px;
    line-height: 1.6;
  }
  .content pre code {
    background: none;
    padding: 0;
    color: inherit;
    font-size: inherit;
  }

  /* ── Tables ── */
  .content table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 13.5px;
  }
  .content th {
    background: var(--accent);
    color: white;
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .content td {
    padding: 9px 14px;
    border-bottom: 1px solid var(--line);
    color: var(--ink-2);
    vertical-align: top;
  }
  .content tr:nth-child(even) td { background: var(--accent-bg); }
  .content tr:hover td { background: #f0f9ff; }

  /* ── Mermaid diagrams ── */
  .content .mermaid {
    background: white;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 24px;
    margin: 20px 0;
    text-align: center;
    overflow-x: auto;
  }

  /* ── Loading / Error states ── */
  .state-box {
    max-width: 480px;
    margin: 80px auto;
    text-align: center;
    padding: 32px;
  }
  .state-box .icon { font-size: 48px; margin-bottom: 16px; }
  .state-box h2 { font-size: 20px; margin: 0 0 10px 0; color: var(--ink); }
  .state-box p { color: var(--muted); font-size: 14px; line-height: 1.6; margin: 0; }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .content { padding: 24px 16px 60px; }
    .topbar { padding: 10px 16px; }
    .content h1 { font-size: 22px; }
    .content h2 { font-size: 17px; }
    .content table { font-size: 12px; }
    .content th, .content td { padding: 7px 10px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="StageAI%20GTM%20Strategy%20%E2%80%94%20founder%20report.html">← Назад</a>
  <span class="sep">|</span>
  <span class="doc-title" id="topbar-title">Загрузка…</span>
</div>

<div id="app">
  <div class="state-box">
    <div class="spinner"></div>
    <h2>Загрузка документа</h2>
    <p>Получаем содержимое…</p>
  </div>
</div>

<script>
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    themeVariables: {
      primaryColor: '#eff6ff',
      primaryBorderColor: '#1e40af',
      primaryTextColor: '#1a1a1a',
      lineColor: '#6b7280',
      fontSize: '13px'
    }
  });

  // Configure marked to handle mermaid fences specially
  const renderer = new marked.Renderer();
  let mermaidCount = 0;

  renderer.code = function(code, lang) {
    if (lang === 'mermaid') {
      const id = 'mermaid-' + (++mermaidCount);
      return '<div class="mermaid" id="' + id + '">' + code + '</div>';
    }
    return '<pre><code>' + code.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
  };

  marked.use({ renderer });

  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  async function load() {
    const src = getParam('src');
    if (!src) {
      document.getElementById('app').innerHTML = `
        <div class="state-box">
          <div class="icon">🗂️</div>
          <h2>Файл не указан</h2>
          <p>Добавьте параметр <code>?src=filename.md</code> в URL.</p>
        </div>`;
      return;
    }

    document.getElementById('topbar-title').textContent = decodeURIComponent(src);
    document.title = decodeURIComponent(src).replace(/\.md$/, '');

    try {
      const res = await fetch(src);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const html = marked.parse(text);

      document.getElementById('app').innerHTML = '<div class="content">' + html + '</div>';

      // Render mermaid diagrams
      await mermaid.run({ querySelector: '.mermaid' });
    } catch (err) {
      document.getElementById('app').innerHTML = `
        <div class="state-box">
          <div class="icon">⚠️</div>
          <h2>Не удалось загрузить файл</h2>
          <p>Убедитесь, что файл открыт через веб-сервер (не по протоколу <code>file://</code>).
          <br><br>Файл: <strong>${decodeURIComponent(src)}</strong>
          <br><br>Откройте папку с помощью <code>python3 -m http.server 8080</code> и перейдите на <a href="http://localhost:8080">localhost:8080</a>.</p>
        </div>`;
    }
  }

  load();
</script>
</body>
</html>
