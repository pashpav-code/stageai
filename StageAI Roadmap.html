u043a\u0438 (\u043c\u0430\u0439 2026)\n\n### \u0413\u043e\u0442\u043e\u0432\u043e \u0432 `context/`\n\n| \u0410\u0440\u0442\u0435\u0444\u0430\u043a\u0442 | \u0424\u0430\u0439\u043b |\n|---|---|\n| POV framework | POV \u2014 how to build) |\n| Finance-first playbook | POV \u2014 finance-first outbound) |\n| GTM W3 motion | GTM \u2014 finance-first motion) |\n| VUZI illustration | Vuzix illustration) |\n| ICP S/P/L/W | Understanding brief \u00a73.11\u20133.12 |\n\n### P0 execution (\u0434\u043e / \u043d\u0430 W1)\n\n| # | \u0427\u0442\u043e | \u041a\u043e\u0433\u0434\u0430 |\n|---|-----|--------|\n| P0 | Owner GTM \u00b7 KPI 90d \u00b7 \u0440\u0435\u0435\u0441\u0442\u0440 \u0432\u043e\u043f\u0440\u043e\u0441\u043e\u0432 A\u2013C | W1 (1\u20137 \u0438\u044e\u043d) |\n| P0 | **Email infra:** \u0434\u043e\u043c\u0435\u043d\u044b (\u0437\u0430\u043a\u0430\u0437\u0447\u0438\u043a) \u00b7 Zapmail \u00b7 **warmup start** | **Pre-W1 (\u043c\u0430\u0439)** |\n| P0 | **LinkedIn account map** (3 active) + tone guide | W1 (1\u20137 \u0438\u044e\u043d) |\n| P0 | CRM access \u00b7 \u043f\u043e\u043b\u044f `buyer_motion`, `account_tier` | W1 (1\u20137 \u0438\u044e\u043d) |\n| P1 | 3 buyer personas v1 | W2 (8\u201314 \u0438\u044e\u043d) |\n| P1 | Single-account context template (CRM + repo) | W2\u20133 (8\u201321 \u0438\u044e\u043d) |\n| P1 | n8n / Prospeo research pipeline v0 \u2192 v1 | W2 \u2192 W4 |\n| P1 | GetSales workspace + 3 seats | W1\u20132 (1\u201314 \u0438\u044e\u043d) |\n| P1 | **Sales visuals baseline** (4 \u043d\u043e\u0432\u044b\u0445) + battle cards draft | W2\u20133 |\n| P1 | **Battle cards pack full** (7 cards) | W5 |\n| P1 | **Daily Slack report** (basic \u2192 full) | W3 \u2192 W6 |\n| P1 | **Call analysis agent** (Gong/Fathom \u2192 Slack + context) | W5 |\n| P1 | **Hermes scheduled agent** (target accounts scan) | W7\u20138 |\n| P1 | **Business case calculators** (per active deal) | W10\u201312 |\n| P1 | **WhyzerAI** subscription (deep account research, public co.) | W2 |\n\n---\n\n## Pre-project \u00b7 Email infra (\u043c\u0430\u0439, \u0434\u043e 1 \u0438\u044e\u043d)\n\n**\u0426\u0435\u043b\u044c:** \u043f\u0435\u0440\u0432\u044b\u0435 cold email **\u2265 W5** \u2192 warmup **\u2265 3 \u043d\u0435\u0434**.\n\n- [ ] \u0421\u043e\u0433\u043b\u0430\u0441\u043e\u0432\u0430\u0442\u044c \u0441 \u0437\u0430\u043a\u0430\u0437\u0447\u0438\u043a\u043e\u043c: \u0431\u044e\u0434\u0436\u0435\u0442 \u0434\u043e\u043c\u0435\u043d\u043e\u0432 (DNS \u0443 \u0437\u0430\u043a\u0430\u0437\u0447\u0438\u043a\u0430), Zapmail (10 mailboxes / \u20ac39)\n- [ ] 2\u20133 \u0434\u043e\u043c\u0435\u043d\u0430 \u00b7 SPF / DKIM / DMARC\n- [ ] **4\u20136 inbox** \u043d\u0430 \u0441\u0442\u0430\u0440\u0442 \u2192 \u043f\u043b\u0430\u043d \u0434\u043e **10** \u043a M3 scale\n- [ ] Warmup \u0437\u0430\u043f\u0443\u0449\u0435\u043d \u00b7 \u043b\u0438\u043c\u0438\u0442 **25 sends / inbox / day**\n- [ ] Deliverability: redirect domains, photos, signatures\n\n**Deliverables:** infra runbook \u00b7 inbox inventory \u00b7 warmup dashboard\n\n---\n\n## W1 \u00b7 1\u20137 \u0438\u044e\u043d \u00b7 Onboarding + Foundation\n\n**Tracks:** Pipeline (\u0434\u043e\u0441\u0442\u0443\u043f\u044b, shadow) \u00b7 Infra (warmup check, GetSales) \u00b7 Outbound (kickoff).\n\n- [ ] Kickoff: \u0446\u0435\u043b\u0438 90 \u0434\u043d\u0435\u0439 \u00b7 scope Voitech + DH \u00b7 weekly rhythm\n- [ ] \u0420\u0435\u0435\u0441\u0442\u0440 \u0432\u043e\u043f\u0440\u043e\u0441\u043e\u0432 A \u2192 B \u2192 C \u00b7 owner GTM \u00b7 KPI 90d\n- [ ] 6 paying clients \u00d7 motion \u00d7 \u0447\u0435\u043a (\u0440\u0435\u0430\u043b\u044c\u043d\u044b\u0435 \u0447\u0435\u043a\u0438 \u2014 \u0441 \u0444\u0430\u0443\u043d\u0434\u0435\u0440\u0430)\n- [ ] 4 \u043f\u0440\u043e\u0434\u0443\u043a\u0442\u043e\u0432\u044b\u0445 \u0441\u043b\u043e\u044f one-pager \u00b7 Motion A vs B \u0432 CRM\n- [ ] **ICP v0.1:** voice/on-device \u00b7 W1 vs W3 \u00b7 \u0430\u043d\u0442\u0438-\u043f\u0430\u0442
